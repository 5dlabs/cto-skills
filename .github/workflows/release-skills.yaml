name: 📦 Release Skills

on:
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '**/*.yaml'
      - '**/*.json'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build agent-project tarballs
        run: |
          mkdir -p dist

          # Each top-level directory (except dotfiles and _shared) is an agent.
          # For each agent we produce:
          #   {agent}-default.tar.gz           — just _default/ skills
          #   {agent}-{project}.tar.gz         — _default merged with project overrides
          #
          # Structure: {agent}/_default/{skill}/{files}
          #            {agent}/{project}/{skill}/{files}  (project overrides _default)
          #
          # Tarball contents: {agent}/{skill}/{files}  (flat, no project prefix)

          for agent_dir in */; do
            agent=$(basename "$agent_dir")

            # Skip dotfiles, _shared, and non-directories
            [[ "$agent" == .* ]] && continue
            [[ "$agent" == _shared ]] && continue
            [ ! -d "$agent_dir" ] && continue

            # Always produce {agent}-default.tar.gz from _default/
            if [ -d "$agent_dir/_default" ]; then
              staging=$(mktemp -d)
              mkdir -p "$staging/$agent"

              for skill_dir in "$agent_dir/_default"/*/; do
                [ ! -d "$skill_dir" ] && continue
                skill=$(basename "$skill_dir")
                cp -r "$skill_dir" "$staging/$agent/$skill"
              done

              skill_count=$(ls -d "$staging/$agent"/*/ 2>/dev/null | wc -l | tr -d ' ')
              if [ "$skill_count" -gt 0 ]; then
                tar czf "dist/${agent}-default.tar.gz" -C "$staging" "$agent"
                echo "Packaged: ${agent}-default.tar.gz ($skill_count skills)"
              else
                echo "WARN: $agent/_default has no skills, skipping"
              fi
              rm -rf "$staging"
            fi

            # For each project dir, produce {agent}-{project}.tar.gz
            # (merged: _default base + project overrides)
            for project_dir in "$agent_dir"*/; do
              project=$(basename "$project_dir")
              [ ! -d "$project_dir" ] && continue
              [ "$project" = "_default" ] && continue

              staging=$(mktemp -d)
              mkdir -p "$staging/$agent"

              # 1. Copy _default skills first (base layer)
              if [ -d "$agent_dir/_default" ]; then
                for skill_dir in "$agent_dir/_default"/*/; do
                  [ ! -d "$skill_dir" ] && continue
                  skill=$(basename "$skill_dir")
                  cp -r "$skill_dir" "$staging/$agent/$skill"
                done
              fi

              # 2. Overlay project-specific skills (overrides _default)
              for skill_dir in "$project_dir"*/; do
                [ ! -d "$skill_dir" ] && continue
                skill=$(basename "$skill_dir")
                rm -rf "$staging/$agent/$skill"
                cp -r "$skill_dir" "$staging/$agent/$skill"
              done

              skill_count=$(ls -d "$staging/$agent"/*/ 2>/dev/null | wc -l | tr -d ' ')
              if [ "$skill_count" -gt 0 ]; then
                tar czf "dist/${agent}-${project}.tar.gz" -C "$staging" "$agent"
                echo "Packaged: ${agent}-${project}.tar.gz ($skill_count skills)"
              fi
              rm -rf "$staging"
            done
          done

          # Also package _shared if it exists
          if [ -d "_shared" ]; then
            staging=$(mktemp -d)
            mkdir -p "$staging/_shared"
            if [ -d "_shared/_default" ]; then
              for skill_dir in "_shared/_default"/*/; do
                [ ! -d "$skill_dir" ] && continue
                skill=$(basename "$skill_dir")
                cp -r "$skill_dir" "$staging/_shared/$skill"
              done
            fi
            skill_count=$(ls -d "$staging/_shared"/*/ 2>/dev/null | wc -l | tr -d ' ')
            if [ "$skill_count" -gt 0 ]; then
              tar czf "dist/_shared.tar.gz" -C "$staging" "_shared"
              echo "Packaged: _shared.tar.gz ($skill_count skills)"
            fi
            rm -rf "$staging"
          fi

          # Generate hashes.txt manifest
          cd dist
          sha256sum *.tar.gz > hashes.txt
          echo ""
          echo "=== hashes.txt ==="
          cat hashes.txt
          echo ""
          echo "Total tarballs: $(grep -c '.tar.gz' hashes.txt)"

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

      - name: Create rolling latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --title "Latest Skills Release" \
            --notes "Auto-published on $(date -u +%Y-%m-%dT%H:%M:%SZ) from commit $(git rev-parse --short HEAD).

          Contains agent-project tarballs named \`{agent}-{project}.tar.gz\`:
          - \`{agent}-default.tar.gz\` — just \`_default/\` skills
          - \`{agent}-{project}.tar.gz\` — \`_default\` merged with project overrides

          The CTO controller fetches \`hashes.txt\`, downloads the matching tarball, and caches it locally." \
            --latest \
            dist/*

  # Refresh Context7 index so agents can query up-to-date tool/skill docs.
  # Runs in parallel with the release job — independent consumers.
  context7-sync:
    runs-on: ubuntu-latest
    # Secret not empty → run. Can't reference `secrets.*` in job `if:`,
    # so gate by setting an env var and checking that instead.
    env:
      HAS_KEY: ${{ secrets.CONTEXT7_API_KEY != '' }}
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Skip if no API key
        if: env.HAS_KEY != 'true'
        run: |
          echo "CONTEXT7_API_KEY not configured, skipping refresh."
      - name: Refresh Context7 index
        if: env.HAS_KEY == 'true'
        env:
          CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY }}
        run: |
          echo "Triggering Context7 re-index for 5dlabs/cto-agents..."
          HTTP_STATUS=$(curl -s -o /tmp/ctx7-response.json -w "%{http_code}" \
            -X POST "https://context7.com/api/v1/refresh" \
            -H "Authorization: Bearer ${CONTEXT7_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"libraryName": "/5dlabs/cto-agents"}')

          echo "Response (HTTP ${HTTP_STATUS}):"
          cat /tmp/ctx7-response.json
          echo ""

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Context7 refresh triggered successfully"
          elif [ "$HTTP_STATUS" -eq 429 ]; then
            echo "⚠️  Rate limited — Context7 will auto-index on next cycle"
          elif grep -q 'too-early\|user-has-active-task' /tmp/ctx7-response.json 2>/dev/null; then
            echo "ℹ️  Context7 refresh skipped (cooldown or task in progress) — non-fatal."
          else
            echo "❌ Context7 refresh failed (HTTP ${HTTP_STATUS})"
            exit 1
          fi
